# 自动发布到 PyPI 的工作流
name: Publish to PyPI

# 触发条件：当推送带有版本标签时自动发布
on:
  push:
    tags:
      - 'v*'  # 匹配所有以 'v' 开头的标签，如 v1.0.0, v1.2.3
  workflow_dispatch:  # 允许手动触发
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0). Must match __init__.py version.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  # 构建和发布任务
  build-and-publish:
    name: Build and publish Python distribution to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sufe-cli
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Verify version tag
        run: |
          # 提取源码中的版本号
          VERSION=$(python -c '
          import re
          with open("src/sufe_cli/__init__.py", "r") as f:
              if match := re.search(r"__version__\s*=\s*[\"'"'"']([^\"'"'"']+)[\"'"'"']", f.read()):
                  print(match.group(1))
              else:
                  raise ValueError("Version not found in __init__.py")
          ')
          echo "Package version: $VERSION"
          
          # 获取目标版本（手动触发优先使用 input，推送触发使用 Git tag）
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TARGET_VERSION="${{ github.event.inputs.version }}"
            # 如果输入了带有 v 的前缀，自动去掉
            TARGET_VERSION=${TARGET_VERSION#v}
            echo "Target version (from input): $TARGET_VERSION"
          else
            TARGET_VERSION=${GITHUB_REF#refs/tags/v}
            echo "Target version (from tag): $TARGET_VERSION"
          fi
          
          if [ "$VERSION" != "$TARGET_VERSION" ]; then
            echo "Error: Package version ($VERSION) does not match target version ($TARGET_VERSION)"
            exit 1
          fi
          echo "Version verification passed!"

      - name: Build package
        run: |
          uv build
          ls -la dist/

      - name: Check package
        run: uv run --with twine twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  # 验证发布成功的任务
  verify-publication:
    name: Verify PyPI publication
    runs-on: ubuntu-latest
    needs: build-and-publish
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false # 验证阶段无需缓存

      - name: Verify and test package from PyPI
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION=${VERSION#v}
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          
          echo "Waiting for version $VERSION to propagate on PyPI..."
          
          # 优雅的轮询等待机制 (最大重试 12 次，每次 10 秒)
          MAX_RETRIES=12
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES..."
            
            # 使用 uv tool install 测试全局 CLI 安装，--no-cache 确保拉取 PyPI 最新状态
            if uv --no-cache tool install --force "sufe-cli==$VERSION"; then
              echo "✅ Package successfully published and installed!"
              
              # 简单验证 CLI 连通性
              sufe --help
              exit 0
            fi
            sleep 10
          done
          
          echo "❌ Package not found on PyPI after waiting."
          exit 1
